# Pre-commit hooks for AEGIS
# Jira: AEGIS-25 — secrets management (local gitleaks guardrail)
#
# Install once per clone:
#   pip install pre-commit
#   pre-commit install
#
# Run against all files on demand:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)