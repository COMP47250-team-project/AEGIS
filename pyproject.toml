[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in default arguments
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # ignore unused imports in __init__.py

[tool.black]
target-version = ["py312"]
line-length = 88

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["backend/app"]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/alembic",
    "backend/.venv",
    "backend/app/config.py",
    "backend/app/routers/auth.py",
    "backend/app/routers/telemetry.py",
    "backend/app/routers/exams.py",
    "backend/app/routers/export.py",
    "backend/app/routers/sessions.py",
    "backend/app/schemas/session.py",
    "backend/app/schemas/telemetry.py",
    "backend/app/services/scoring.py",
    "backend/app/services/scorer.py",
    "backend/app/services/telemetry_service.py",
    "backend/app/services/live_monitor.py",
    "backend/app/services/messaging.py",
    "backend/app/services/scoring/__init__.py",
    "backend/app/services/scoring/components/paste.py",
    "backend/app/services/scoring/components/tab_blur.py",
    "backend/app/services/scoring/components/answer_time.py",
    "backend/app/services/scoring/components/iki.py",
    "backend/app/services/scoring/components/resize.py",
    "backend/app/services/scoring/components/first_keypress.py",
    "backend/app/models/__init__.py",
    "backend/app/models/telemetry.py",
    "backend/app/routers/exams.py",
    "backend/app/routers/export.py",
    "backend/app/routers/sessions.py",
    "backend/app/schemas/session.py",
    "backend/app/schemas/telemetry.py",
    "backend/app/services/messaging.py",
    "backend/app/services/scoring/components/answer_time.py",
    "backend/app/services/scoring/components/iki.py",
    "backend/app/services/scoring/components/resize.py",
    "backend/app/services/scoring/components/first_keypress.py"
]
venvPath = "backend"
venv = ".venv"