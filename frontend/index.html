<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEGIS — Adaptive Exam Guardian</title>
  </head>
  <body>
    <!-- 
      This is the single HTML file for the entire React app.
      The <div id="root"> is where React mounts the whole application.
      React takes over this div and renders everything inside it.
    -->
    <div id="root"></div>
    <!-- 
      Vite processes main.tsx and replaces this script tag with the
      compiled, bundled JavaScript.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
