<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100..700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEGIS — Adaptive Exam Guardian</title>
    <!-- Apply the saved theme before first paint to avoid a light/dark flash
         (AEGIS-74). Only sets data-theme when the user has made an explicit
         choice; otherwise the CSS prefers-color-scheme default applies. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("aegis-theme");
          if (t === "dark" || t === "light") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- 
      This is the single HTML file for the entire React app.
      The <div id="root"> is where React mounts the whole application.
      React takes over this div and renders everything inside it.
    -->
    <div id="root"></div>
    <!-- 
      Vite processes main.tsx and replaces this script tag with the
      compiled, bundled JavaScript.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
